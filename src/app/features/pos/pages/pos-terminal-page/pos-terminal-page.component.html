<section class="pos-page">
  <header class="pos-header">
    <div>
      <p class="eyebrow">Punto de venta</p>
      <h1>POS</h1>
      <p class="muted">Estado: {{ sessionId ? 'SesiÃ³n abierta' : 'SesiÃ³n cerrada' }}</p>
    </div>
    <div class="pos-controls">
      <p-select
        appendTo="body"
        [options]="warehouseOptions"
        optionLabel="name"
        optionValue="id"
        placeholder="Selecciona almacÃ©n"
        [(ngModel)]="selectedWarehouseId"
        [disabled]="warehouseOptions.length === 0"
      ></p-select>

      <p-inputNumber
        inputId="openingAmount"
        [ngModel]="openingForm.controls.openingAmount.value"
        (ngModelChange)="openingForm.controls.openingAmount.setValue($event ?? 0)"
        [min]="0"
        locale="en-US"
        placeholder="Monto apertura"
      ></p-inputNumber>

      <p-button
        label="Abrir sesiÃ³n"
        icon="pi pi-play"
        severity="success"
        [disabled]="!!sessionId || !selectedWarehouseId || sessionLoading"
        (onClick)="openSession()"
      ></p-button>
      <p-button
        label="Cerrar sesiÃ³n"
        icon="pi pi-stop"
        severity="secondary"
        [disabled]="!sessionId || sessionLoading"
        (onClick)="closeSession()"
      ></p-button>
    </div>
    <p class="pos-note">La venta se registra con el precio base de la variante.</p>
  </header>

  <section class="pos-layout">
    <p-card>
      <bc-pos-product-selector
        [products]="products"
        [loading]="productsLoading"
        (search)="onSearchProducts($event)"
        (addProduct)="onAddProduct($event)"
      ></bc-pos-product-selector>
    </p-card>

    <div class="pos-column">
      <p-card>
        <bc-pos-cart-lines
          [lines]="cartLines"
          (quantityChange)="onQuantityChange($event.lineId, $event.quantity)"
          (remove)="onRemoveLine($event)"
        ></bc-pos-cart-lines>
      </p-card>

      <p-card>
        <bc-pos-totals
          [subtotal]="subtotal"
          [discountTotal]="discountTotal"
          [total]="total"
          [itemsCount]="cartLines.length"
          (checkout)="onCheckout($event)"
        ></bc-pos-totals>
      </p-card>
    </div>
  </section>
</section>
