<section class="totals-panel">
  <header class="panel-header">
    <div>
      <p class="eyebrow">Summary</p>
      <h2>Totals</h2>
    </div>
    <p class="items-count">{{ itemsCount }} items</p>
  </header>

  <div class="totals-row">
    <span>Subtotal</span>
    <strong>{{ subtotal | currency: 'USD' }}</strong>
  </div>
  <div class="totals-row">
    <span>Discounts</span>
    <strong>- {{ discountTotal | currency: 'USD' }}</strong>
  </div>
  <div class="totals-row total">
    <span>Total</span>
    <strong>{{ total | currency: 'USD' }}</strong>
  </div>

  <form [formGroup]="paymentForm" class="payment-form">
    <label for="paymentMethod">Payment method</label>
    <p-select
      inputId="paymentMethod"
      [options]="paymentMethods"
      optionLabel="label"
      optionValue="value"
      formControlName="method"
    ></p-select>

    <label for="paymentAmount">Amount received</label>
    <p-inputNumber inputId="paymentAmount" formControlName="amount" [min]="0" locale="en-US"></p-inputNumber>

    <div class="totals-row change">
      <span>Change</span>
      <strong>{{ changeDue | currency: 'USD' }}</strong>
    </div>
  </form>

  <p *ngIf="insufficientAmount" class="error-text">Amount is insufficient to complete the sale.</p>

  <p-button label="Confirm sale" icon="pi pi-check" (onClick)="onCheckout()"></p-button>
</section>
