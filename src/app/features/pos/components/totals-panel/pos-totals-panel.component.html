<p-card class="pos-panel">
  <ng-template pTemplate="header">
    <div class="pos-panel__header">
      <div>
        <p class="eyebrow">Resumen</p>
        <h2>Totales</h2>
      </div>
      <p class="items-count">{{ itemsCount }} artículos</p>
    </div>
  </ng-template>

  <div class="totals-row">
    <span>Subtotal</span>
    <strong>{{ subtotal | currency: 'USD' }}</strong>
  </div>
  <div class="totals-row">
    <span>Descuentos</span>
    <strong>- {{ discountTotal | currency: 'USD' }}</strong>
  </div>
  <div class="totals-row total">
    <span>Total</span>
    <strong>{{ total | currency: 'USD' }}</strong>
  </div>

  <form [formGroup]="paymentForm" class="payment-form">
    <label for="paymentMethod">Método de pago</label>
    <p-select
      inputId="paymentMethod"
      [options]="paymentMethods"
      optionLabel="label"
      optionValue="value"
      formControlName="method"
    ></p-select>

    <label for="paymentAmount">Monto recibido</label>
    <p-inputNumber inputId="paymentAmount" formControlName="amount" [min]="0" locale="es-GT"></p-inputNumber>

    <div class="totals-row change">
      <span>Cambio</span>
      <strong>{{ changeDue | currency: 'USD' }}</strong>
    </div>
  </form>

  <p *ngIf="insufficientAmount" class="error-text">El monto es insuficiente para completar la venta.</p>

  <p-button type="button" label="Confirmar venta" icon="pi pi-check" (onClick)="onCheckout()"></p-button>
</p-card>
