<section class="product-selector">
  <form class="search-form" [formGroup]="searchForm" (ngSubmit)="onSubmit()">
    <input pInputText formControlName="term" placeholder="Search by name, SKU, or barcode" />
    <p-button type="submit" label="Search" icon="pi pi-search"></p-button>
  </form>

  <p-table [value]="products" [loading]="loading" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Product</th>
        <th>SKU</th>
        <th>Price</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>
          <div class="line-title">{{ item.name }}</div>
          <div class="line-meta">{{ item.barcode || '-' }}</div>
        </td>
        <td>{{ item.sku || '-' }}</td>
        <td>{{ item.price | currency: 'USD' }}</td>
        <td class="actions">
          <p-button
            icon="pi pi-plus"
            label="Add"
            size="small"
            [disabled]="!item.isActive"
            (onClick)="onAdd(item)"
          ></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">No results.</td>
      </tr>
    </ng-template>
  </p-table>
</section>
