<p-card class="pos-panel">
  <ng-template pTemplate="header">
    <div class="pos-panel__header">
      <h2>Búsqueda de variantes</h2>
    </div>
  </ng-template>

  <div class="pos-search">
    <input
      pInputText
      type="text"
      placeholder="Buscar por nombre, SKU o código"
      [(ngModel)]="query"
      (keyup.enter)="onSearch()"
    />
    <p-button type="button" label="Buscar" icon="pi pi-search" (onClick)="onSearch()"></p-button>
  </div>

  <p-table [value]="products" [loading]="loading" dataKey="id" [rows]="6">
    <ng-template pTemplate="header">
      <tr>
        <th>Producto</th>
        <th>SKU</th>
        <th>Precio</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.name }}</td>
        <td>{{ item.sku || '-' }}</td>
        <td>{{ item.price | currency: 'USD' }}</td>
        <td class="pos-actions">
          <p-button
            type="button"
            icon="pi pi-plus"
            label="Agregar"
            (onClick)="onAdd(item)"
            [disabled]="!item.isActive"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
