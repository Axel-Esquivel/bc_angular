<form [formGroup]="form" class="dialog-form">
  <div class="field">
    <app-variant-picker
      label="Variante"
      placeholder="Buscar variante"
      [value]="form.controls.variantId.value || null"
      [displayValue]="form.controls.variantLabel.value || null"
      (valueChange)="onVariantValueChange($event)"
      (variantSelected)="onVariantSelected($event)"
    ></app-variant-picker>
  </div>

  <div class="field-group">
    <div class="field">
      <label for="qty">Cantidad</label>
      <p-inputNumber
        inputId="qty"
        formControlName="qty"
        [locale]="numberLocale"
        [min]="0"
        [minFractionDigits]="0"
        [maxFractionDigits]="0"
      ></p-inputNumber>
    </div>
    <div class="field">
      <label for="unitCost">Precio</label>
      <p-inputNumber
        inputId="unitCost"
        formControlName="unitCost"
        [locale]="numberLocale"
        [min]="0"
        [minFractionDigits]="2"
        [maxFractionDigits]="2"
      ></p-inputNumber>
    </div>
  </div>

  <div class="hint" *ngIf="lastCost?.lastCost !== null && lastCost?.lastCost !== undefined">
    Costo sugerido: {{ lastCost?.lastCost }} {{ lastCost?.lastCurrency || '' }}
  </div>

  <div class="actions">
    <p-button
      label="Cancelar"
      severity="secondary"
      (onClick)="close()"
      type="button"
    ></p-button>
    <p-button
      label="Agregar"
      icon="pi pi-plus"
      (onClick)="confirm()"
      type="button"
    ></p-button>
  </div>
</form>
