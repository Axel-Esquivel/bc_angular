<div class="lines-accordion" [formGroup]="form">
  <div formArrayName="lines">
    <p-accordion [multiple]="true">
      <p-accordion-panel *ngFor="let group of formArray.controls; let i = index" [value]="i">
        <p-accordion-header>
          <div class="line-header">
            <div class="line-title">
              {{ getLineVariantLabel(i) }}
            </div>
            <div class="line-summary">
              <span>Qty: {{ getLineQty(i) }}</span>
              <span>Total: {{ getLineTotal(i) | number:'1.2-2' }}</span>
            </div>
          </div>
        </p-accordion-header>
        <p-accordion-content>
          <div class="line-body" [formGroupName]="i">
            <div class="line-fields">
              <div class="field">
                <label for="packaging-{{ i }}">Empaque</label>
                <p-select
                  inputId="packaging-{{ i }}"
                  formControlName="packagingId"
                  [options]="packagingOptions"
                  optionLabel="label"
                  optionValue="value"
                  (onChange)="onPackagingChange(i)"
                ></p-select>
                <small class="field-hint">Multiplicador guardado en el pedido (snapshot).</small>
              </div>
              <div class="field">
                <label for="qty-{{ i }}">Cantidad</label>
                <p-inputNumber
                  inputId="qty-{{ i }}"
                  formControlName="qty"
                  [locale]="numberLocale"
                  [min]="0"
                  [minFractionDigits]="0"
                  [maxFractionDigits]="0"
                ></p-inputNumber>
              </div>
              <div class="field">
                <label for="multiplier-{{ i }}">Multiplicador</label>
                <p-inputNumber
                  inputId="multiplier-{{ i }}"
                  formControlName="packagingMultiplier"
                  [locale]="numberLocale"
                  [min]="1"
                  [minFractionDigits]="0"
                  [maxFractionDigits]="0"
                ></p-inputNumber>
              </div>
              <div class="field">
                <label>Base (unidades)</label>
                <div class="field-static">{{ getLineBaseQty(i) }}</div>
              </div>
              <div class="field">
                <label for="unitCost-{{ i }}">Precio / costo</label>
                <p-inputNumber
                  inputId="unitCost-{{ i }}"
                  formControlName="unitCost"
                  [locale]="numberLocale"
                  [min]="0"
                  [minFractionDigits]="2"
                  [maxFractionDigits]="2"
                ></p-inputNumber>
              </div>
              <div class="field">
                <label for="currency-{{ i }}">Moneda</label>
                <p-select
                  inputId="currency-{{ i }}"
                  formControlName="currency"
                  [options]="currencyOptions"
                  optionLabel="label"
                  optionValue="value"
                ></p-select>
              </div>
              <div class="field">
                <label for="freight-{{ i }}">Flete</label>
                <p-inputNumber
                  inputId="freight-{{ i }}"
                  formControlName="freightCost"
                  [locale]="numberLocale"
                  [min]="0"
                  [minFractionDigits]="2"
                  [maxFractionDigits]="2"
                ></p-inputNumber>
              </div>
              <div class="field">
                <label for="extra-{{ i }}">Gastos extra</label>
                <p-inputNumber
                  inputId="extra-{{ i }}"
                  formControlName="extraCosts"
                  [locale]="numberLocale"
                  [min]="0"
                  [minFractionDigits]="2"
                  [maxFractionDigits]="2"
                ></p-inputNumber>
              </div>
              <div class="field full">
                <label for="notes-{{ i }}">Observaci&oacute;n</label>
                <input pInputText [id]="'notes-' + i" formControlName="notes" />
              </div>
            </div>
            <div class="line-actions">
              <p-button
                label="Quitar"
                icon="pi pi-trash"
                severity="danger"
                (onClick)="onRemove(i)"
              ></p-button>
            </div>
          </div>
        </p-accordion-content>
      </p-accordion-panel>
    </p-accordion>
  </div>
</div>
