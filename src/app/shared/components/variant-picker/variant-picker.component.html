<div class="variant-picker">
  <p-floatLabel *ngIf="!hideInput">
    <p-inputgroup>
      <input
        pInputText
        [value]="displayText"
        [placeholder]="placeholder"
        [readonly]="true"
        [disabled]="disabled"
        [id]="inputId"
      />
      <p-button
        icon="pi pi-search"
        [disabled]="disabled"
        styleClass="p-button-secondary p-button-icon-only"
        (onClick)="openDialog()"
        [title]="'Buscar variante'"
      ></p-button>
      <p-button
        *ngIf="displayText"
        icon="pi pi-times"
        [disabled]="disabled"
        styleClass="p-button-secondary p-button-icon-only"
        (onClick)="clearSelection()"
        [title]="'Limpiar'"
      ></p-button>
    </p-inputgroup>
    <label [for]="inputId">{{ label }}</label>
  </p-floatLabel>
</div>

<p-dialog
  header="Buscar variante"
  [(visible)]="dialogVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(1100px, 95vw)' }"
  [appendTo]="'body'"
  (onHide)="closeDialog()"
>
  <div class="variant-dialog">
    <div class="search-bar">
      <input
        pInputText
        type="text"
        [formControl]="searchControl"
        placeholder="Buscar por SKU, código de barras o nombre"
      />
    </div>

    <p-table [value]="results" [loading]="loading" dataKey="id" [rows]="10" [paginator]="results.length > 10">
      <ng-template pTemplate="header">
        <tr>
          <th>SKU</th>
          <th>Barcode</th>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Producto</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>{{ row.sku || '-' }}</td>
          <td>{{ row.barcode || '-' }}</td>
          <td>{{ row.name }}</td>
          <td>{{ row.categoryName || '-' }}</td>
          <td>{{ row.productName || '-' }}</td>
          <td class="actions">
            <p-button
              label="Seleccionar"
              icon="pi pi-check"
              size="small"
              (onClick)="selectVariant(row)"
            ></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6">Sin resultados.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-dialog>
